<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Countryball Builder Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        #canvas-container { 
            background: #252525; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            touch-action: none; 
            margin-bottom: 20px;
            border: 2px solid #444;
        }

        .controls { background: #2c3e50; padding: 20px; border-radius: 12px; width: 100%; max-width: 420px; box-sizing: border-box; }
        
        input[type="file"] { width: 100%; margin-bottom: 15px; color: #bdc3c7; }
        
        .btn-download { 
            width: 100%; padding: 15px; background: #27ae60; color: white; border: none; 
            border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-download:active { transform: scale(0.98); background: #219150; }

        .btn-del { width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px; margin-top: 10px; cursor: pointer; }

        /* Estilos de la ventana de felicitación */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #modal-content { text-align: center; background: #2c3e50; padding: 30px; border-radius: 20px; border: 3px solid #27ae60; }
        #preview-img { max-width: 250px; border-radius: 10px; margin: 20px 0; border: 2px solid white; }
        .congrats-text { font-size: 1.5rem; font-weight: bold; color: #2ecc71; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Countryball Creator</h2>
    
    <div id="canvas-container">
        <canvas id="ballCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <label style="display:block; margin-bottom:5px;">Añadir Imagen:</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <div id="editControls" style="display:none; border-top: 1px solid #444; padding-top: 10px;">
            <label>Escala del objeto:</label>
            <input type="range" id="scaleRange" min="0.05" max="3" step="0.01">
            <button class="btn-del" onclick="deleteSelected()">Eliminar Seleccionado</button>
        </div>

        <button class="btn-download" onclick="exportCountryball()">¡Descarga tu Countryball!</button>
    </div>

    <div id="modal" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="random-phrase" class="congrats-text"></div>
            <p>¡Felicidades por tu creación!</p>
            <img id="preview-img" src="" alt="Vista previa">
            <p style="font-size: 0.8rem; color: #bdc3c7;">Se ha guardado en tu carpeta de descargas</p>
            <button onclick="closeModal()" style="padding: 10px 20px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ballCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        
        // Forma elipsoide realista
        const ball = { x: 200, y: 210, rx: 165, ry: 148 };

        let layers = { flag: null, eyes: null, accessories: [] };
        let selected = null;
        let isDragging = false;
        let startX, startY;

        function drawBallPath() {
            ctx.beginPath();
            ctx.ellipse(ball.x, ball.y, ball.rx, ball.ry, 0, 0, Math.PI * 2);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Bandera recortada
            if (layers.flag) {
                ctx.save();
                drawBallPath();
                ctx.clip();
                ctx.drawImage(layers.flag.img, layers.flag.x, layers.flag.y, 
                              layers.flag.img.width * layers.flag.scale, 
                              layers.flag.img.height * layers.flag.scale);
                ctx.restore();
            }

            // 2. Sombra y Volumen
            ctx.save();
            drawBallPath();
            const grad = ctx.createRadialGradient(ball.x - 45, ball.y - 45, 20, ball.x, ball.y, ball.rx);
            grad.addColorStop(0, 'rgba(255,255,255,0.15)');
            grad.addColorStop(0.7, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.lineWidth = 7;
            ctx.strokeStyle = '#000';
            ctx.stroke();
            ctx.restore();

            // 3. Ojos y Accesorios
            const items = [layers.eyes, ...layers.accessories].filter(i => i);
            items.forEach(item => {
                ctx.drawImage(item.img, item.x, item.y, item.img.width * item.scale, item.img.height * item.scale);
                if (selected === item) {
                    ctx.save();
                    ctx.strokeStyle = '#3498db';
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(item.x, item.y, item.img.width * item.scale, item.img.height * item.scale);
                    ctx.restore();
                }
            });
        }

        // --- Lógica de Interacción ---
        imageInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const type = prompt("Categoría:\n1: Bandera (Fondo)\n2: Ojos\n3: Accesorio", "3");
                    let item = { img, x: 100, y: 100, scale: 0.5 };
                    if (type === "1") {
                        item.scale = 1;
                        layers.flag = item;
                    } else if (type === "2") {
                        layers.eyes = item;
                    } else {
                        layers.accessories.push(item);
                    }
                    selected = item;
                    document.getElementById('editControls').style.display = 'block';
                    draw();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Arrastre Táctil y Ratón
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) {
            const p = getPos(e);
            const all = [...layers.accessories, layers.eyes, layers.flag].filter(i => i);
            selected = all.find(i => p.x > i.x && p.x < i.x + i.img.width * i.scale && p.y > i.y && p.y < i.y + i.img.height * i.scale);
            if (selected) {
                isDragging = true;
                startX = p.x - selected.x;
                startY = p.y - selected.y;
                document.getElementById('editControls').style.display = 'block';
                document.getElementById('scaleRange').value = selected.scale;
            }
            draw();
        }

        function move(e) {
            if (isDragging && selected) {
                if(e.cancelable) e.preventDefault();
                const p = getPos(e);
                selected.x = p.x - startX;
                selected.y = p.y - startY;
                draw();
            }
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        document.getElementById('scaleRange').oninput = (e) => { if(selected) { selected.scale = e.target.value; draw(); } };

        function deleteSelected() {
            if (selected === layers.flag) layers.flag = null;
            else if (selected === layers.eyes) layers.eyes = null;
            else layers.accessories = layers.accessories.filter(a => a !== selected);
            selected = null;
            draw();
        }

        // --- FUNCIÓN DE DESCARGA Y FELICITACIONES ---
        function exportCountryball() {
            // Deseleccionar para que no salga el cuadro azul en la foto
            selected = null;
            draw();

            // Elegir frase al azar
            const frases = ["¡Excelente!", "¡Increíble!", "¡El Exclusivo!", "¡Obra de arte!", "¡Wow!"];
            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
            
            // Obtener la imagen del canvas
            const dataURL = canvas.toDataURL("image/png");
            
            // Mostrar Modal
            document.getElementById('random-phrase').innerText = fraseAleatoria;
            document.getElementById('preview-img').src = dataURL;
            document.getElementById('modal').style.display = 'flex';

            // Descarga automática
            const link = document.createElement('a');
            link.download = 'mi-countryball.png';
            link.href = dataURL;
            link.click();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        draw();
    </script>
</body>
</html>

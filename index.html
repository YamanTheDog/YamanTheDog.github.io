<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Countryball Maker 1.1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; padding-top: 40px; }
        
        .lang-selector { position: absolute; top: 5px; right: 10px; background: #2c3e50; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        #canvas-container { 
            background: #252525; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            touch-action: none; 
            margin-bottom: 20px;
            border: 2px solid #444;
        }

        .controls { background: #2c3e50; padding: 20px; border-radius: 12px; width: 100%; max-width: 420px; box-sizing: border-box; }
        
        /* Nuevo estilo para el Select */
        .category-select { width: 100%; padding: 12px; margin-bottom: 15px; background: #34495e; color: white; border: 1px solid #555; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        
        input[type="file"] { width: 100%; margin-bottom: 15px; color: #bdc3c7; }
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .control-group input[type="range"] { width: 100%; }

        .btn-download { 
            width: 100%; padding: 15px; background: #27ae60; color: white; border: none; 
            border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-download:active { transform: scale(0.98); background: #219150; }

        .btn-del { width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px; margin-top: 10px; cursor: pointer; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #modal-content { text-align: center; background: #2c3e50; padding: 30px; border-radius: 20px; border: 3px solid #27ae60; }
        #preview-img { max-width: 250px; border-radius: 10px; margin: 20px 0; border: 2px solid white; }
        .congrats-text { font-size: 1.5rem; font-weight: bold; color: #2ecc71; margin-bottom: 10px; }
    </style>
</head>
<body>

    <select class="lang-selector" id="langSelect" onchange="changeLanguage()">
        <option value="en" selected>English</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
    </select>

    <h2 id="t-title">Countryball Creator</h2>
    
    <div id="canvas-container">
        <canvas id="ballCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <label id="t-catLabel" style="display:block; margin-bottom:5px;">Select Category:</label>
        <select id="categorySelect" class="category-select">
            <option value="3" id="t-cat3" selected>Accessory</option>
            <option value="1" id="t-cat1">Flag (Background)</option>
            <option value="2" id="t-cat2">Eyes</option>
        </select>

        <label id="t-add" style="display:block; margin-bottom:5px;">Add Image:</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <div id="editControls" style="display:none; border-top: 1px solid #444; padding-top: 10px;">
            <div class="control-group">
                <label id="t-scale">Object Scale:</label>
                <input type="range" id="scaleRange" min="0.05" max="3" step="0.01">
            </div>
            
            <div class="control-group">
                <label id="t-rotate">Object Rotation:</label>
                <input type="range" id="rotateRange" min="-360" max="360" step="1" value="0">
            </div>

            <button class="btn-del" id="t-del" onclick="deleteSelected()">Delete Selected</button>
        </div>

        <button class="btn-download" id="t-down" onclick="exportCountryball()">Download your Countryball!</button>
    </div>

    <div id="modal" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="random-phrase" class="congrats-text"></div>
            <p id="t-congrats">Congratulations on your creation!</p>
            <img id="preview-img" src="" alt="Vista previa">
            <p id="t-saved" style="font-size: 0.8rem; color: #bdc3c7;">Saved to your downloads folder</p>
            <button id="t-close" onclick="closeModal()" style="padding: 10px 20px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                title: "Countryball Creator", catLabel: "Select Category:", cat1: "Flag (Background)", cat2: "Eyes", cat3: "Accessory",
                add: "Add Image:", scale: "Object Scale:", rotate: "Object Rotation:", del: "Delete Selected", down: "Download your Countryball!",
                congrats: "Congratulations on your creation!", saved: "Saved to your downloads folder", close: "Close",
                phrases: ["Excellent!", "Incredible!", "Exclusive!", "Masterpiece!", "Wow!"]
            },
            es: {
                title: "Creador de Countryballs", catLabel: "Seleccionar Categoría:", cat1: "Bandera (Fondo)", cat2: "Ojos", cat3: "Accesorio",
                add: "Añadir Imagen:", scale: "Escala del objeto:", rotate: "Rotación del objeto:", del: "Eliminar Seleccionado", down: "¡Descarga tu Countryball!",
                congrats: "¡Felicidades por tu creación!", saved: "Se ha guardado en tu carpeta de descargas", close: "Cerrar",
                phrases: ["¡Excelente!", "¡Increíble!", "¡El Exclusivo!", "¡Obra de arte!", "¡Wow!"]
            },
            pt: {
                title: "Criador de Countryballs", catLabel: "Selecione a Categoria:", cat1: "Bandeira (Fundo)", cat2: "Olhos", cat3: "Acessório",
                add: "Adicionar Imagem:", scale: "Escala do objeto:", rotate: "Rotação do objeto:", del: "Excluir Selecionado", down: "Baixe sua Countryball!",
                congrats: "Parabéns pela sua criação!", saved: "Salvo na sua pasta de downloads", close: "Fechar",
                phrases: ["Excelente!", "Incrível!", "Exclusivo!", "Obra de arte!", "Uau!"]
            },
            ru: {
                title: "Создатель Countryball", catLabel: "Выберите категорию:", cat1: "Флаг (Фон)", cat2: "Глаза", cat3: "Аксессуар",
                add: "Добавить изображение:", scale: "Масштаб объекта:", rotate: "Вращение объекта:", del: "Удалить выбранное", down: "Скачай свой Countryball!",
                congrats: "Поздравляем с созданием!", saved: "Сохранено в папку загрузок", close: "Закрыть",
                phrases: ["Отлично!", "Невероятно!", "Эксклюзив!", "Шедевр!", "Вау!"]
            }
        };

        let currentLang = "en";

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            const t = i18n[currentLang];
            
            document.documentElement.lang = currentLang;
            document.getElementById('t-title').innerText = t.title;
            document.getElementById('t-catLabel').innerText = t.catLabel;
            document.getElementById('t-cat1').innerText = t.cat1;
            document.getElementById('t-cat2').innerText = t.cat2;
            document.getElementById('t-cat3').innerText = t.cat3;
            document.getElementById('t-add').innerText = t.add;
            document.getElementById('t-scale').innerText = t.scale;
            document.getElementById('t-rotate').innerText = t.rotate;
            document.getElementById('t-del').innerText = t.del;
            document.getElementById('t-down').innerText = t.down;
            document.getElementById('t-congrats').innerText = t.congrats;
            document.getElementById('t-saved').innerText = t.saved;
            document.getElementById('t-close').innerText = t.close;
        }

        const canvas = document.getElementById('ballCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        
        const ball = { x: 200, y: 210, rx: 165, ry: 148 };
        let layers = { flag: null, eyes: null, accessories: [] };
        let selected = null;
        let isDragging = false;
        let startX, startY;

        function drawBallPath() {
            ctx.beginPath();
            ctx.ellipse(ball.x, ball.y, ball.rx, ball.ry, 0, 0, Math.PI * 2);
        }

        function drawItem(item, isClipped) {
            if (!item) return;
            const w = item.img.width * item.scale;
            const h = item.img.height * item.scale;
            const cx = item.x + w / 2;
            const cy = item.y + h / 2;

            ctx.save();
            if (isClipped) {
                drawBallPath();
                ctx.clip();
            }

            ctx.translate(cx, cy);
            ctx.rotate((item.rotation || 0) * Math.PI / 180);
            ctx.drawImage(item.img, -w / 2, -h / 2, w, h);

            if (selected === item && !isClipped) {
                ctx.strokeStyle = '#3498db';
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(-w / 2, -h / 2, w, h);
            }
            
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (layers.flag) drawItem(layers.flag, true);

            ctx.save();
            drawBallPath();
            const grad = ctx.createRadialGradient(ball.x - 45, ball.y - 45, 20, ball.x, ball.y, ball.rx);
            grad.addColorStop(0, 'rgba(255,255,255,0.15)');
            grad.addColorStop(0.7, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.lineWidth = 7;
            ctx.strokeStyle = '#000';
            ctx.stroke();
            ctx.restore();

            if (layers.eyes) drawItem(layers.eyes, false);
            layers.accessories.forEach(acc => drawItem(acc, false));
        }

        imageInput.onchange = (e) => {
            if (!e.target.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const type = document.getElementById('categorySelect').value;
                    let item = { img, x: 100, y: 100, scale: 0.5, rotation: 0 };
                    
                    if (type === "1") {
                        item.scale = 1;
                        layers.flag = item;
                    } else if (type === "2") {
                        layers.eyes = item;
                    } else if (type === "3") {
                        layers.accessories.push(item);
                    }
                    
                    selected = item;
                    updateControls();
                    draw();
                    
                    imageInput.value = ""; 
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateControls() {
            if (selected) {
                document.getElementById('editControls').style.display = 'block';
                document.getElementById('scaleRange').value = selected.scale;
                document.getElementById('rotateRange').value = selected.rotation;
            } else {
                document.getElementById('editControls').style.display = 'none';
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) {
            if (e.cancelable) e.preventDefault(); // Evita conflictos con dobles toques en móviles
            
            const p = getPos(e);
            // Ordenamos desde la capa más profunda a la más superficial antes de invertirlo
            const all = [layers.flag, layers.eyes, ...layers.accessories].filter(i => i);
            
            selected = all.reverse().find(i => 
                p.x > i.x && p.x < i.x + i.img.width * i.scale && 
                p.y > i.y && p.y < i.y + i.img.height * i.scale
            );
            
            if (selected) {
                isDragging = true;
                startX = p.x - selected.x;
                startY = p.y - selected.y;
            }
            updateControls();
            draw();
        }

        function move(e) {
            if (isDragging && selected) {
                if(e.cancelable) e.preventDefault();
                const p = getPos(e);
                selected.x = p.x - startX;
                selected.y = p.y - startY;
                draw();
            }
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        document.getElementById('scaleRange').oninput = (e) => { 
            if(selected) { selected.scale = parseFloat(e.target.value); draw(); } 
        };
        
        document.getElementById('rotateRange').oninput = (e) => { 
            if(selected) { selected.rotation = parseInt(e.target.value); draw(); } 
        };

        function deleteSelected() {
            if (selected === layers.flag) layers.flag = null;
            else if (selected === layers.eyes) layers.eyes = null;
            else layers.accessories = layers.accessories.filter(a => a !== selected);
            selected = null;
            updateControls();
            draw();
        }

        function exportCountryball() {
            selected = null; 
            updateControls();
            draw();

            const frases = i18n[currentLang].phrases;
            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
            
            const dataURL = canvas.toDataURL("image/png");
            
            document.getElementById('random-phrase').innerText = fraseAleatoria;
            document.getElementById('preview-img').src = dataURL;
            document.getElementById('modal').style.display = 'flex';

            const link = document.createElement('a');
            link.download = 'mi-countryball.png';
            link.href = dataURL;
            link.click();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        changeLanguage();
        draw();
    </script>
</body>
</html>
